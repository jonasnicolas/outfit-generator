<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wardrobe.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- Native-WebView hints (Natively / iOS / Android home-screen) -->
    <meta name="theme-color" content="#c0c0c0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Outfit98" />
    <title>Outfit98</title>
    <!-- Apply the saved theme before first paint (avoids a flash of Classic). -->
    <script>
      try {
        var t = localStorage.getItem("outfit98-theme");
        if (t && t !== "classic")
          document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="https://unpkg.com/98.css@0.2.1/build/98.css" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
